<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pacijenti — Sigurni karton pacijenata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand"><span class="mark">S</span> Sigurni karton pacijenata</div>
    <div class="topbar-right">
      <span class="role-badge" id="roleBadge"></span>
      <a href="/admin.html" class="btn-ghost" id="adminLink" style="display:none; text-decoration:none;">Admin panel</a>
      <button class="btn-ghost" id="logoutBtn">Odjavi se</button>
    </div>
  </div>

  <div class="container">
    <div class="page-head">
      <div>
        <h2>Pacijenti</h2>
       
      </div>
      <button class="btn-primary" id="addBtn">+ Novi pacijent</button>
    </div>

    <div class="card">
      <div class="card-body" style="padding:0;">
        <table>
          <thead>
            <tr>
              <th>Ime i prezime</th>
              <th>Datum rodjenja</th>
              <th>Telefon</th>
              <th>JMBG</th>
              <th>Dijagnoza</th>
              <th>Akcije</th>
            </tr>
          </thead>
          <tbody id="patientsBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">
          <h3>Jos nema pacijenata</h3>
          <p>Kliknite na "+ Novi pacijent" da dodate prvi zapis.</p>
        </div>
      </div>
    </div>


  </div>

  <!-- Modal: Add / Edit patient -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Novi pacijent</h3>
        <button class="close-x" id="closeModalBtn">&times;</button>
      </div>
      <form id="patientForm">
        <div class="modal-body">
          <div class="error-banner" id="formError"></div>
          <div class="field-row">
            <div class="field"><label for="f_ime">Ime</label><input type="text" id="f_ime" required /></div>
            <div class="field"><label for="f_prezime">Prezime</label><input type="text" id="f_prezime" required /></div>
          </div>
          <div class="field-row">
            <div class="field"><label for="f_datum">Datum rodjenja</label><input type="date" id="f_datum" /></div>
            <div class="field"><label for="f_telefon">Telefon</label><input type="text" id="f_telefon" placeholder="06x-xxx-xxxx" /></div>
          </div>
          <div class="field">
            <label for="f_jmbg">JMBG <span class="lock-tag">🔒 enkriptovano</span></label>
            <input type="text" id="f_jmbg" class="mono" maxlength="13" placeholder="13 cifara" />
          </div>
          <div class="field">
            <label for="f_dijagnoza">Dijagnoza <span class="lock-tag">🔒 enkriptovano</span></label>
            <input type="text" id="f_dijagnoza" placeholder="npr. Hipertenzija (I10)" />
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn-ghost" id="cancelModalBtn">Otkazi</button>
          <button type="submit" class="btn-primary" id="saveBtn">Sacuvaj</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
