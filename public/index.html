<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prijava — Sigurni karton pacijenata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-mark">S</div>
      <h1>Sigurni karton pacijenata</h1>
      <p class="login-sub">Prijavite se da pristupite sistemu. Svaka prijava se evidentira.</p>

      <div class="error-banner" id="errorBanner"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Korisnicko ime</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Lozinka</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn" style="width:100%; padding:11px;">Prijavi se</button>
      </form>
     
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
